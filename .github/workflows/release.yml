name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Sync in-repo version files to match the tag.
      - name: Sync version files to $VERSION
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              if (!fs.existsSync(f)) continue;
              const o = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (o.version !== undefined) o.version = '$VERSION';
              if (o.metadata?.version !== undefined) o.metadata.version = '$VERSION';
              if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + '\n');
            }
          "

      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          skill_name = "splitwise-mcp"
          out = pathlib.Path(f"{skill_name}-{version}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      - name: Build .mcpb bundle
        run: |
          npx @anthropic-ai/mcpb pack
          mv splitwise-mcp.mcpb "splitwise-mcp-${VERSION}.mcpb"

      # Idempotent: skip if this version is already on the registry, so the
      # workflow can be re-run safely on the same tag (e.g. after a flaky
      # downstream publish step).
      - name: Publish to npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "npm already has ${PKG}@${VERSION} — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance

      # ─── modelcontextprotocol/registry (PulseMCP auto-ingests from here weekly) ───
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # ─── ClawHub (OpenClaw skill registry) — conditional on CLAWHUB_TOKEN ───
      - name: Publish skill to ClawHub
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          if [ ! -f SKILL.md ]; then
            echo "SKILL.md not present — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          # ClawHub's `publish` rejects folders that look like a plugin
          # (.claude-plugin/plugin.json present), and `package publish`
          # requires an openclaw.plugin.json we don't have. Workaround: copy
          # SKILL.md to a clean temp dir and publish that as a standalone skill.
          SKILL_DIR=$(mktemp -d)
          cp SKILL.md "$SKILL_DIR/"
          npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug splitwise-mcp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            splitwise-mcp-${{ env.VERSION }}.skill
            splitwise-mcp-${{ env.VERSION }}.mcpb
          generate_release_notes: true
